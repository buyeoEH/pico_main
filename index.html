<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌱 스마트 IoT 모니터링</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dashboard-card">

        <h1>🌱 스마트 IoT 모니터링</h1>

        <div id="moisturePercent" class="percent-box loading">
            --%
        </div>

        <div id="moistureStatus" class="status-box">
            데이터를 불러오는 중...
        </div>

        <div class="sensor-box">

            <div class="sensor-item">
                <div class="sensor-label">🌡️ 온도</div>
                <div id="temperature" class="sensor-value">-- ℃</div>
            </div>

            <div class="sensor-item">
                <div class="sensor-label">💧 습도</div>
                <div id="humidity" class="sensor-value">-- %</div>
            </div>

        </div>

        <div class="raw-data">
            <span id="moistureRaw">
                센서 원본 값: 대기 중
            </span>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
